server {
    listen 2503 ssl default_server;
    http2 on;
    server_name _;

    ssl_reject_handshake on;
}

server {
    listen 2503 ssl;
    http2 on;
    server_name api.saviour.cc.cd;

    underscores_in_headers on;

    ssl_certificate /root/cert/saviour.cc.cd/saviour.cc.cd.pem;
    ssl_certificate_key /root/cert/saviour.cc.cd/saviour.cc.cd.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 256m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    access_log /var/log/nginx/sub2api-api.access.log sub2api_timing;
    error_log /var/log/nginx/sub2api-api.error.log;

    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }

    location ^~ /theme/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }

    location ^~ /v1/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
    }
}

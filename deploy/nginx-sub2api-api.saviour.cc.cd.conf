# Optional helper directives for this vhost. This file is included from nginx.conf's http{} context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

log_format sub2api_gateway '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          'upstream_status="$upstream_status" '
                          'request_length="$request_length" '
                          'request_time="$request_time" '
                          'upstream_response_time="$upstream_response_time" '
                          'host="$host" sni="$ssl_server_name" '
                          '"$http_referer" "$http_user_agent"';

server {
    listen 2503 ssl default_server;
    http2 on;
    server_name _;

    ssl_reject_handshake on;
}

server {
    listen 2503 ssl;
    http2 on;
    server_name api.saviour.cc.cd;

    underscores_in_headers on;

    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    ssl_certificate /root/cert/saviour.cc.cd/saviour.cc.cd.pem;
    ssl_certificate_key /root/cert/saviour.cc.cd/saviour.cc.cd.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 256m;

    access_log /var/log/nginx/sub2api-api.access.log sub2api_gateway;
    error_log /var/log/nginx/sub2api-api.error.log info;

    location / {
        proxy_request_buffering off;
        client_body_buffer_size 16m;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://chat.saviour.cc.cd" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "$http_access_control_request_headers" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0 always;
            add_header Content-Type "text/plain; charset=utf-8" always;
            return 204;
        }

        add_header Access-Control-Allow-Origin "https://chat.saviour.cc.cd" always;

        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}

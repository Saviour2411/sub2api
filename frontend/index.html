<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sub2API - AI API Gateway</title>
  </head>
  <body>
    <div id="app">
      <style>
        html {
          background: #03070d;
        }
        body {
          margin: 0;
          min-height: 100vh;
          background:
            linear-gradient(135deg, rgba(75, 181, 255, 0.18), transparent 34%),
            linear-gradient(105deg, #03070d 0%, #07101c 48%, #0b1420 100%);
          color: #f8fbff;
          font-family:
            Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .app-bootstrap-fallback {
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 24px;
          box-sizing: border-box;
        }
        .app-bootstrap-panel {
          width: min(420px, 100%);
          border: 1px solid rgba(75, 181, 255, 0.42);
          background: rgba(5, 12, 22, 0.84);
          box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38), 0 0 48px rgba(23, 152, 242, 0.16);
          clip-path: polygon(18px 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%, 0 18px);
          padding: 28px;
        }
        .app-bootstrap-kicker {
          color: #7dd3fc;
          font: 700 11px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          letter-spacing: 0;
          margin-bottom: 12px;
          text-transform: uppercase;
        }
        .app-bootstrap-title {
          font-size: 24px;
          font-weight: 800;
          line-height: 1.2;
          margin: 0 0 10px;
        }
        .app-bootstrap-text {
          color: #b8c7d8;
          font-size: 14px;
          line-height: 1.6;
          margin: 0;
        }
        .app-bootstrap-bar {
          height: 2px;
          margin-top: 22px;
          overflow: hidden;
          background: rgba(255, 255, 255, 0.1);
        }
        .app-bootstrap-bar::before {
          content: "";
          display: block;
          width: 45%;
          height: 100%;
          background: linear-gradient(90deg, #4bb5ff, #ff6f38);
          animation: app-bootstrap-scan 1.15s ease-in-out infinite;
        }
        @keyframes app-bootstrap-scan {
          0% {
            transform: translateX(-100%);
          }
          100% {
            transform: translateX(230%);
          }
        }
        @media (prefers-color-scheme: light) {
          html {
            background: #eaf1f8;
          }
          body {
            background:
              linear-gradient(135deg, rgba(23, 152, 242, 0.14), transparent 34%),
              linear-gradient(105deg, #f8fcff 0%, #eaf3fb 52%, #dceaf6 100%);
            color: #0f172a;
          }
          .app-bootstrap-panel {
            border-color: rgba(23, 152, 242, 0.34);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 28px 70px rgba(15, 68, 112, 0.18);
          }
          .app-bootstrap-kicker {
            color: #0f86d8;
          }
          .app-bootstrap-text {
            color: #475569;
          }
          .app-bootstrap-bar {
            background: rgba(15, 23, 42, 0.1);
          }
        }
      </style>
      <div class="app-bootstrap-fallback">
        <div class="app-bootstrap-panel">
          <div class="app-bootstrap-kicker">ACCESS TERMINAL</div>
          <h1 class="app-bootstrap-title">正在连接 ZeroAPI</h1>
          <p class="app-bootstrap-text">正在加载控制台资源，请稍候。</p>
          <div class="app-bootstrap-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
